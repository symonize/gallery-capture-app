[build]
  command = "pnpm build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "pnpm dev"
  targetPort = 5173
  framework = "#custom"

# Clean /api/* paths -> Netlify Functions. Must come BEFORE the SPA fallback.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback: serve index.html for client-side routes so deep links / refresh work.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
